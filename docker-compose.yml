# Local-dev dependencies only (Story 1.1, Task 4) — dev ergonomics, NOT the
# deferred SaaS/on-prem Temporal-hosting or production-infra decision
# (architecture Deferred section).
services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aitestgen
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/admin-tools:1.31.2
    command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"   # gRPC frontend
      - "8233:8233"   # Web UI

  # Dev-mode only (Story 1.3, Task 2) — in-memory, unsealed, root token fixed
  # for local/CI convenience. Not the deferred production Vault-vs-cloud-KMS
  # topology decision.
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
