name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref instead of running the full matrix twice.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (api, workers, packages)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aitestgen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Dev-mode Vault (Story 1.3, Task 2) — without this, the AD-5/NFR-1
      # "credentials never touch Postgres/logs in plaintext" test would
      # silently skip in CI instead of actually enforcing the rule.
      vault:
        image: hashicorp/vault:1.18
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-only-root-token
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
        ports:
          - 8200:8200
        options: --cap-add=IPC_LOCK
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/aitestgen
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: dev-only-root-token
      TEMPORAL_ADDRESS: localhost:7233
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # Temporal's admin-tools image needs a command override (`server
      # start-dev`) that the declarative `services:` block can't express,
      # so it's started as a plain background container instead.
      - name: Start Temporal dev server
        run: |
          docker run -d --name temporal -p 7233:7233 -p 8233:8233 \
            temporalio/admin-tools:1.31.2 \
            temporal server start-dev --ip 0.0.0.0
          for i in $(seq 1 30); do
            (echo > /dev/tcp/localhost/7233) 2>/dev/null && exit 0
            sleep 1
          done
          echo "Temporal did not become reachable on :7233 within 30s" >&2
          exit 1
      - name: Sync workspace (pinned Python 3.14.6)
        run: uv sync --all-packages
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (pyright)
        run: uv run pyright
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Test (pytest)
        run: uv run pytest

  web:
    name: Web (apps/web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
      - name: Install deps
        run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npx tsc -b
      - name: Test (vitest)
        run: npm test
      - name: Build
        run: npx vite build

  api-types-drift:
    name: API types are not hand-edited (AD-6)
    runs-on: ubuntu-latest
    # No Postgres service: this job only reads /openapi.json, which touches no DB.
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
      - name: Sync Python workspace
        run: uv sync --all-packages
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Start API server
        run: |
          uv run --package api uvicorn api.main:app --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/openapi.json > /dev/null && exit 0
            sleep 1
          done
          echo "API server did not become reachable on :8000 within 30s" >&2
          exit 1
      - name: Regenerate API types
        working-directory: apps/web
        run: npm run generate:api-types
      - name: Fail if checked-in types drifted
        run: git diff --exit-code apps/web/src/api-types.gen.ts
