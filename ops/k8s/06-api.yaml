apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aitestgen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: REPLACE_IMAGE
          ports:
            - containerPort: 8000
          env:
            # $(VAR) below only expands against vars defined in this *env*
            # list (not envFrom), so POSTGRES_HOST/PORT/DB are re-declared
            # here from the ConfigMap even though envFrom also brings them in.
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: aitestgen-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: aitestgen-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: aitestgen-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: POSTGRES_PASSWORD
            # Postgres is externally hosted (e.g. RDS) — not a Service in
            # this cluster. The password never gets written to the ConfigMap.
            - name: DATABASE_URL
              value: "postgresql+psycopg://postgres:$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: SESSION_SECRET_KEY
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: VAULT_TOKEN
          envFrom:
            - configMapRef:
                name: aitestgen-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aitestgen
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
