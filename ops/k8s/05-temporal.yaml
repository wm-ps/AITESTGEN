# Single in-memory `start-dev` server (matches local docker-compose parity)
# — no persistence, no HA. Fine to get running; revisit (Temporal Cloud or
# a real self-hosted cluster) before this holds real workflow history.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: aitestgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/admin-tools:1.31.2
          command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0"]
          ports:
            - containerPort: 7233
            - containerPort: 8233
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: aitestgen
spec:
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
    - name: ui
      port: 8233
      targetPort: 8233
