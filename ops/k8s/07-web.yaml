# The web image bakes VITE_API_BASE in at build time (Vite inlines env vars
# into the static bundle) — it must be built AFTER the api Service's
# LoadBalancer hostname is known. See the deploy runbook, step 5.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: aitestgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: REPLACE_IMAGE
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: aitestgen
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
