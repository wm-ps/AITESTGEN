# No Service — this is a Temporal worker, all outbound connections (to
# temporal/postgres/vault/minio), nothing listens for inbound traffic.
# Resource requests are higher than the other services: each crawl runs a
# real headless Chromium instance (Story 2.2).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-worker
  namespace: aitestgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-worker
  template:
    metadata:
      labels:
        app: discovery-worker
    spec:
      containers:
        - name: discovery-worker
          image: REPLACE_ECR_REGISTRY/aitestgen-discovery-worker:latest
          env:
            # $(VAR) below only expands against vars defined in this *env*
            # list (not envFrom), so POSTGRES_HOST/PORT/DB are re-declared
            # here from the ConfigMap even though envFrom also brings them in.
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: aitestgen-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: aitestgen-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: aitestgen-config
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: POSTGRES_PASSWORD
            # Postgres is externally hosted (e.g. RDS) — not a Service in
            # this cluster. The password never gets written to the ConfigMap.
            - name: DATABASE_URL
              value: "postgresql+psycopg://postgres:$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: VAULT_TOKEN
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: MINIO_SECRET_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: ANTHROPIC_API_KEY
          envFrom:
            - configMapRef:
                name: aitestgen-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
