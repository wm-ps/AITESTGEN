[project]
name = "domain"
version = "0.1.0"
description = "packages/domain — SQLModel entities and their invariants, shared by apps/api and apps/workers/*"
requires-python = ">=3.14"
dependencies = [
    "sqlmodel>=0.0.24",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/domain"]
