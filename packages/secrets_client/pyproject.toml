[project]
name = "secrets-client"
version = "0.1.0"
description = "SecretsClient port (architecture AD-5) + Vault dev-mode adapter (Story 1.3)"
requires-python = ">=3.14"
dependencies = [
    "hvac>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/secrets_client"]
