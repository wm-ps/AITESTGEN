[project]
name = "workflows"
version = "0.1.0"
description = "packages/workflows — Temporal Workflow definitions; orchestration only, no I/O (architecture AD-2)"
requires-python = ">=3.14"
dependencies = [
    "temporalio>=1.9",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workflows"]
