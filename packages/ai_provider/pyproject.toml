[project]
name = "ai-provider"
version = "0.1.0"
description = "AIProvider port — single abstraction for all LLM calls (architecture AD-3)"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28,<1",
    "domain",
]

[tool.uv.sources]
domain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_provider"]
