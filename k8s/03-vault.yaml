# Dev-mode Vault, in-cluster, no persistence (matches local docker-compose
# parity) — its data is scoped to storing onboarded Applications' target-app
# credentials (packages/secrets_client.VaultSecretsClient), not deployment
# secrets. The root token itself comes from the aitestgen-secrets k8s Secret,
# not a hardcoded value.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: aitestgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.18
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: VAULT_TOKEN
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: aitestgen
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
