apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: aitestgen
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: aitestgen
spec:
  replicas: 1
  strategy:
    type: Recreate # single ReadWriteOnce volume — never run 2 pods at once
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.4
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "aitestgen"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata # avoids postgres choking on lost+found on a fresh EBS volume
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aitestgen
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
