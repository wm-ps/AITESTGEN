apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aitestgen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: REPLACE_ECR_REGISTRY/aitestgen-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: POSTGRES_PASSWORD
            # Kubernetes expands $(VAR) against earlier env entries in this
            # same list — this is how the password gets into the URL
            # without ever being written to the ConfigMap.
            - name: DATABASE_URL
              value: "postgresql+psycopg://postgres:$(POSTGRES_PASSWORD)@postgres:5432/aitestgen"
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: SESSION_SECRET_KEY
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aitestgen-secrets
                  key: VAULT_TOKEN
          envFrom:
            - configMapRef:
                name: aitestgen-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aitestgen
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
