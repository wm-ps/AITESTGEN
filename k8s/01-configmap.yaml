# Non-secret config, shared across services. CORS_ALLOWED_ORIGINS starts as
# a placeholder — the real value (the web LoadBalancer's hostname) isn't
# known until after the web Service exists. Step 6 of the deploy runbook
# patches this ConfigMap once that hostname is available.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aitestgen-config
  namespace: aitestgen
data:
  CORS_ALLOWED_ORIGINS: "http://REPLACE-AFTER-WEB-DEPLOYED"
  AI_MODEL: "anthropic/claude-sonnet-5"
  MINIO_BUCKET: "discovery-evidence"
  MINIO_ENDPOINT: "minio:9000"
  TEMPORAL_ADDRESS: "temporal:7233"
  VAULT_ADDR: "http://vault:8200"
  # No TLS in front of the LoadBalancer Services yet (see README) — a
  # Secure cookie would never reach the browser over plain HTTP.
  # Flip to "true" only after HTTPS is in place (ACM cert + ALB Ingress,
  # or an NLB with a certificate) in front of the api Service.
  COOKIE_SECURE: "false"
